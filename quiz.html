<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caesar-Quiz · Geheimcode-Akademie</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b25;
    --surface2: #1e2636;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #5a6278;
    --accent: #4f9cf9;
    --accent-dim: rgba(79,156,249,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #f76060;
    --red-dim: rgba(247,96,96,0.12);
    --amber: #f5a623;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  .container { width: 100%; max-width: 620px; }

  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo-text { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .school-badge { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }

  .progress-bar { display: flex; gap: 5px; margin-bottom: 1.75rem; }
  .seg { flex: 1; height: 3px; border-radius: 2px; background: var(--surface2); transition: background 0.4s; }
  .seg.done { background: var(--green); }
  .seg.current { background: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
  .q-sub  { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
  .q-sub strong { color: var(--amber); }

  .cipher-display {
    font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: 0.3em;
    color: var(--text); background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 1.5rem;
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
  .option {
    padding: 14px 18px; border-radius: 10px; font-size: 15px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border2); background: var(--surface2);
    color: var(--text); transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 12px; text-align: left;
  }
  .option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-dim); }
  .option:active:not(.locked) { transform: scale(0.98); }
  .option.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .option.wrong   { border-color: var(--red);   background: var(--red-dim);   color: var(--red);   }
  .option.locked  { cursor: default; }
  .option.reveal  { border-color: var(--green); background: var(--green-dim); color: var(--green); }

  .opt-letter {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center;
    justify-content: center; background: rgba(255,255,255,0.07); flex-shrink: 0;
  }

  .feedback { border-radius: 10px; padding: 14px 16px; font-size: 14px; font-weight: 500;
    line-height: 1.5; margin-bottom: 1rem; display: none; }
  .feedback.success { display: block; background: var(--green-dim); border: 1px solid rgba(62,207,142,0.3); color: var(--green); }
  .feedback.error   { display: block; background: var(--red-dim);   border: 1px solid rgba(247,96,96,0.25);  color: var(--red);   }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px; border-radius: 8px; font-family: var(--sans); font-size: 14px;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2);
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--border2); color: var(--text); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #3a88e8; }

  /* ── WIN SCREEN ─────────────────────────────────────────────────── */
  .win-screen {
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    animation: fadeIn 0.5s ease;
  }

  .big-number {
    font-family: var(--mono);
    font-size: clamp(96px, 28vw, 160px);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #f5a623 0%, #f76060 40%, #4f9cf9 80%, #3ecf8e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    filter: drop-shadow(0 0 40px rgba(245,166,35,0.4));
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(245,166,35,0.3)); transform: scale(1); }
    50%       { filter: drop-shadow(0 0 60px rgba(245,166,35,0.7)); transform: scale(1.04); }
  }

  .win-label {
    font-size: 14px; color: var(--text3); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .win-title { font-size: 26px; font-weight: 700; color: var(--green); margin-bottom: 0.5rem; }
  .win-sub   { font-size: 15px; color: var(--text2); line-height: 1.65; margin-bottom: 2rem; }

  .score-row {
    display: flex; justify-content: center; gap: 2.5rem;
    margin-bottom: 2rem; flex-wrap: wrap;
  }
  .score-box { text-align: center; }
  .score-val { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--accent); }
  .score-lbl { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }

  /* ── CONFETTI ───────────────────────────────────────────────────── */
  #confetti-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 999;
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="container">
  <div class="site-header">
    <div class="logo-text">🔐 GEHEIMCODE-QUIZ</div>
    <div class="school-badge">ESG Bonn · WP Informatik · Klasse 7</div>
  </div>
  <div id="app"></div>
</div>

<script>
/* ─── QUIZ DATA ─────────────────────────────────────────────────────── */
const QUESTIONS = [
  {
    num: 'FRAGE 01 / 02',
    text: 'Welches Klartext-Wort ergibt sich?',
    sub: 'Schlüssel: <strong>K = 3</strong> · Verschiebe jeden Buchstaben 3 Stellen zurück.',
    cipher: 'KHOOR',
    options: ['WORLD', 'HELLO', 'HALLO', 'HULLO'],
    correct: 1,
    feedback: 'Richtig! K→H, H→E, O→L, O→L, R→O ergibt HELLO.'
  },
  {
    num: 'FRAGE 02 / 02',
    text: 'Welchen Schlüssel hat Caesar benutzt?',
    sub: 'Original: <strong>GEHEIM</strong> → Geheimtext: <strong>NLORPT</strong> · Wie groß ist die Verschiebung?',
    cipher: null,
    options: ['K = 5', 'K = 6', 'K = 7', 'K = 8'],
    correct: 2,
    feedback: 'Korrekt! G(7) → N(14): 14 − 7 = 7. Der Schlüssel ist K = 7.'
  }
];

/* ─── STATE ─────────────────────────────────────────────────────────── */
let current = 0, scores = [], chosen = -1;

/* ─── RENDER ────────────────────────────────────────────────────────── */
function render() {
  const app = document.getElementById('app');
  if (current >= QUESTIONS.length) { renderWin(); return; }
  const q = QUESTIONS[current];
  const locked = chosen !== -1;

  const optHtml = q.options.map((o, i) => {
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (i === chosen && i === q.correct) cls += ' correct';
      else if (i === chosen && i !== q.correct) cls += ' wrong';
      else if (i === q.correct) cls += ' reveal';
    }
    const letter = String.fromCharCode(65 + i);
    return `<div class="${cls}" onclick="${locked ? '' : `pick(${i})`}">
      <span class="opt-letter">${letter}</span>${o}
    </div>`;
  }).join('');

  const feedbackHtml = locked
    ? `<div class="feedback ${chosen === q.correct ? 'success' : 'error'}">
        ${chosen === q.correct
          ? `🎉 ${q.feedback}`
          : `🤔 Leider falsch – die richtige Antwort war <strong>${q.options[q.correct]}</strong>. ${q.feedback}`}
       </div>`
    : '';

  app.innerHTML = `
    <div class="progress-bar">
      ${QUESTIONS.map((_,i)=>`<div class="seg ${i<current?'done':i===current?'current':''}"></div>`).join('')}
    </div>
    <div class="card">
      <div class="q-num">${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub2 ? q.sub2 : q.sub}</div>
      ${q.cipher ? `<div class="cipher-display">${q.cipher}</div>` : ''}
      ${feedbackHtml}
      <div class="options">${optHtml}</div>
      <div class="btn-row">
        ${locked ? `<button class="btn primary" onclick="nextQ()">
          ${current < QUESTIONS.length - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen 🏁'}
        </button>` : ''}
      </div>
    </div>`;
}

function pick(i) {
  if (chosen !== -1) return;
  chosen = i;
  scores[current] = (i === QUESTIONS[current].correct);
  render();
}

function nextQ() {
  current++; chosen = -1;
  render();
}

/* ─── WIN SCREEN ────────────────────────────────────────────────────── */
function renderWin() {
  const app = document.getElementById('app');
  const total = scores.filter(Boolean).length;
  const allCorrect = total === QUESTIONS.length;

  app.innerHTML = `
    <div class="card win-screen">
      ${allCorrect ? `
        <div style="font-size:48px;margin-bottom:0.5rem">🎊</div>
        <div class="big-number">67</div>
        <div class="win-label">Herzlichen Glückwunsch!</div>
        <div class="win-title">Perfektes Ergebnis!</div>
        <div class="win-sub">Du hast alle Fragen richtig beantwortet und die Caesar-Verschlüsselung gemeistert! 🏅</div>
      ` : `
        <div style="font-size:56px;margin-bottom:1rem">${total >= 4 ? '⭐' : '📚'}</div>
        <div class="win-title" style="color:${total >= 4 ? 'var(--green)' : 'var(--amber)'}">
          ${total >= 4 ? 'Super gemacht!' : 'Weiter üben!'}
        </div>
        <div class="win-sub">${total} von ${QUESTIONS.length} Fragen richtig – ${total >= 4 ? 'du hast die Caesar-Verschlüsselung gut verstanden!' : 'lies dir die Tipps nochmal durch und versuche es erneut!'}</div>
      `}
      <div class="score-row">
        <div class="score-box">
          <div class="score-val">${total}</div>
          <div class="score-lbl">Richtig</div>
        </div>
        <div class="score-box">
          <div class="score-val">${QUESTIONS.length - total}</div>
          <div class="score-lbl">Falsch</div>
        </div>
        <div class="score-box">
          <div class="score-val">${Math.round(total / QUESTIONS.length * 100)}%</div>
          <div class="score-lbl">Punkte</div>
        </div>
      </div>
      <button class="btn primary" style="width:100%" onclick="restart()">Nochmal spielen 🔄</button>
    </div>`;

  if (allCorrect) startConfetti();
}

/* ─── CONFETTI ──────────────────────────────────────────────────────── */
let confettiActive = false;

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  confettiActive = true;

  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#f5a623','#f76060','#4f9cf9','#3ecf8e','#c084fc','#fb923c','#facc15'];
  const pieces = [];
  const NUM = 180;

  for (let i = 0; i < NUM; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 300,
      w: 8 + Math.random() * 8,
      h: 5 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      vr: (Math.random() - 0.5) * 0.15,
      alpha: 1
    });
  }

  let frame = 0;
  function loop() {
    if (!confettiActive) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    pieces.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot += p.vr;
      if (frame > 160) p.alpha -= 0.008;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });

    const alive = pieces.filter(p => p.alpha > 0 && p.y < canvas.height + 20);
    if (alive.length === 0) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function restart() {
  confettiActive = false;
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  current = 0; scores = []; chosen = -1;
  render();
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

render();
</script>
</body>
</html>
